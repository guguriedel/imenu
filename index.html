<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Livro de Receitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">📖 <span>Meu <em>Livro</em></span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      type="search"
      class="search-input"
      id="search"
      placeholder="Buscar receitas, ingredientes, tags…"
      autocomplete="off"
      oninput="handleSearch(this.value)"
    />
    <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Limpar busca">✕</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <span class="hero-eyebrow">Receitas da Casa</span>
  <h1>O <em>Livro</em><br>de Receitas</h1>
  <p class="hero-sub">Receitas testadas, documentadas e com modo cozinha.</p>
</div>

<!-- STATS -->
<div class="stats-bar" id="stats-bar">
  <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">receitas</span></div>
  <div class="stat"><span class="stat-num" id="stat-cats">—</span><span class="stat-label">categorias</span></div>
</div>

<!-- FILTER PILLS -->
<div class="filters-wrap">
  <div class="filters" id="filters"></div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="sort-bar">
    <span class="results-count" id="results-count"></span>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="newest">Mais recentes</option>
      <option value="alpha">A → Z</option>
      <option value="difficulty">Dificuldade</option>
    </select>
  </div>

  <div id="loading" class="loading">Carregando receitas…</div>
  <div id="recipe-grid" class="recipe-grid"></div>
  <div id="empty" class="empty">
    <div class="empty-icon">🍽</div>
    <div class="empty-title">Nenhuma receita encontrada</div>
    <div class="empty-sub">Tente outro termo ou categoria</div>
  </div>
</div>

<script>
let ALL = [];
let filtered = [];
let activeCategory = 'Todas';
let searchQuery = '';
let sortMode = 'newest';

const DIFF_ORDER = { 'Fácil':0, 'Médio':1, 'Difícil':2 };

// ── Fetch recipes ──
fetch('./recipes.json')
  .then(r => { if(!r.ok) throw new Error('recipes.json não encontrado'); return r.json(); })
  .then(data => {
    ALL = data;
    document.getElementById('loading').style.display = 'none';
    buildFilters();
    renderStats();
    applyFilters();
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      '<span style="color:var(--muted)">⚠ ' + err.message +
      ' — abra pelo servidor (ex: Netlify Drop ou <code>python -m http.server</code>)</span>';
  });

// ── Filters ──
function buildFilters() {
  const cats = ['Todas', ...new Set(ALL.map(r => r.category).filter(Boolean))].sort((a,b) => a==='Todas'?-1:a.localeCompare(b,'pt'));
  const wrap = document.getElementById('filters');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-btn${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent===cat));
  applyFilters();
}

// ── Search ──
function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
  applyFilters();
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  searchQuery = '';
  applyFilters();
}

function matchSearch(r, q) {
  if (!q) return true;
  return (
    r.title?.toLowerCase().includes(q) ||
    r.description?.toLowerCase().includes(q) ||
    r.category?.toLowerCase().includes(q) ||
    r.tags?.some(t => t.toLowerCase().includes(q))
  );
}

function highlight(text, q) {
  if (!q || !text) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ── Sort ──
function setSort(mode) { sortMode = mode; applyFilters(); }

function sortRecipes(arr) {
  return [...arr].sort((a,b) => {
    if (sortMode === 'alpha') return a.title.localeCompare(b.title,'pt');
    if (sortMode === 'difficulty') return (DIFF_ORDER[a.difficulty]??99) - (DIFF_ORDER[b.difficulty]??99);
    return new Date(b.added||0) - new Date(a.added||0);
  });
}

// ── Apply ──
function applyFilters() {
  filtered = ALL
    .filter(r => activeCategory === 'Todas' || r.category === activeCategory)
    .filter(r => matchSearch(r, searchQuery));
  filtered = sortRecipes(filtered);

  renderStats();
  renderCards();
}

function renderStats() {
  const cats = new Set(ALL.map(r => r.category).filter(Boolean));
  document.getElementById('stat-total').textContent = ALL.length;
  document.getElementById('stat-cats').textContent = cats.size;
  document.getElementById('results-count').textContent =
    searchQuery || activeCategory !== 'Todas'
      ? filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '')
      : '';
}

// ── Render cards ──
function renderCards() {
  const grid = document.getElementById('recipe-grid');
  const empty = document.getElementById('empty');
  empty.classList.toggle('visible', filtered.length === 0);
  grid.innerHTML = filtered.map(r => cardHTML(r)).join('');
}

function cardHTML(r) {
  const titleHL = highlight(r.title, searchQuery);
  const descHL  = highlight(r.description || '', searchQuery);
  const tags = (r.tags || []).slice(0,3).map(t =>
    `<span class="tag">${highlight(t, searchQuery)}</span>`
  ).join('');
  const accent = r.color || 'var(--terracotta)';

  return `
<a class="card" href="${r.file}" title="${r.title}">
  <div class="card-accent">
    <div class="card-accent-bg" style="background:${accent}"></div>
    <span class="card-emoji">${r.emoji || '🍽'}</span>
    ${r.category ? `<span class="card-category">${r.category}</span>` : ''}
  </div>
  <div class="card-body">
    <div class="card-title">${titleHL}</div>
    ${r.description ? `<div class="card-desc">${descHL}</div>` : ''}
    <div class="card-meta">
      ${r.time ? `<span class="card-meta-item">⏱ ${r.time}</span>` : ''}
      ${r.time && r.servings ? `<span class="card-meta-dot"></span>` : ''}
      ${r.servings ? `<span class="card-meta-item">🍽 ${r.servings} porç.</span>` : ''}
      ${(r.time || r.servings) && r.difficulty ? `<span class="card-meta-dot"></span>` : ''}
      ${r.difficulty ? `<span class="card-meta-item">${diffIcon(r.difficulty)} ${r.difficulty}</span>` : ''}
    </div>
  </div>
  <div class="card-footer">
    <div class="card-tags">${tags}</div>
    <span class="card-open">Abrir →</span>
  </div>
</a>`;
}

function diffIcon(d) {
  return d === 'Fácil' ? '🟢' : d === 'Médio' ? '🟡' : '🔴';
}
</script>
</body>
</html>
